dataset:
  avgc_dir: "<PATH_TO_AVGC>"

output:
  dir: ./outputs/avgc_aadnet
signal:
  low_hz: 1.0
  high_hz: 9.0
  target_fs: 128
  rereference: common_average
  filter_order: 4

tracker:
  n_eeg_channels: 64
  n_time_steps: 128
  feature_dim: 128
  eeg_hidden_dim: 128
  env_hidden_dim: 128
  temperature: 1.0
  eeg_temporal_kernel: 65
  env_conv1_kernel: 49
  env_conv2_kernel: 65
  dropout: 0.2

aadnet:
  n_eeg_channels: 64
  n_time_steps: 128
  chns_1: [32, [16, 8], [8, 8], [4, 8], [2, 8], 8]
  kernels_1: [1, 37, 49, 65, 77, 5]
  act_1: relu
  chns_1_aud: [1, [1, 4], [1, 4], 0]
  kernels_1_aud: [1, 129, 161, 5]
  pool_stride_1: 1
  hidden_size: 0
  dropout: 0.2
  feature_freeze: false

window:
  window_s: 4.0
  stride_s: 4.0

train:
  epochs: 50
  lr: 1.0e-4
  weight_decay: 1.0e-4
  lambda_crf: 5.0
  lambda_ce: 0.5
  grad_clip: 1.0
  batch_size: 32
  scheduler: cosine
  warmup_crf_epoch: 10

experiment:
  use_aadnet: true
  p_switch_init: 0.001
  learn_p_switch: true
  device: cuda:0
  seed: 42
